name: Process Checklist Content Submissions

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-submission:
    if: contains(join(github.event.issue.labels.*.name, ','), 'content-submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-security-checklist/package-lock.json

      - name: Install dependencies
        working-directory: mcp-security-checklist
        run: npm ci

      - name: Apply content submission
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: npx tsx mcp-security-checklist/scripts/apply-content-submission.ts

      - name: Validate checklist content
        working-directory: mcp-security-checklist
        run: npm run validate-content

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/content-submission-${{ github.event.issue.number }}
          commit-message: "chore(content): apply submission #${{ github.event.issue.number }}"
          title: "chore(content): apply submission #${{ github.event.issue.number }}"
          body: |
            Automated content update generated from issue #${{ github.event.issue.number }}.

            - Source issue: #${{ github.event.issue.number }}
            - Trigger: content-submission issue template
            - Validation: `npm run validate-content`
          add-paths: |
            mcp-security-checklist/src/data/checklist.json
          labels: |
            content-submission
            automated-pr

      - name: Comment with PR link
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = `${{ steps.cpr.outputs.pull-request-number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Submission processed successfully. Opened PR #${pr} for review.`
            });

      - name: Comment on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Submission processing failed. Please check workflow logs and verify your JSON matches the schema in CONTRIBUTING.md sample files.'
            });
