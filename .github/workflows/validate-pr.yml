name: Validate Checklist Content

on:
  pull_request:
    branches:
      - main
    paths:
      - 'mcp-security-checklist/src/data/checklist.json'
      - 'mcp-security-checklist/scripts/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mcp-security-checklist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-security-checklist/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate-content
