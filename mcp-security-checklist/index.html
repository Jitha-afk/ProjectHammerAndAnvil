<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 228-item security checklist for Model Context Protocol deployments. Track your MCP security posture across servers, clients, architecture, and agentic workflows." />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" />
    <title>MCP Security Checklist</title>
    <link rel="icon" type="image/svg+xml" href="/mcp-security-checklist/favicon.svg" />
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('mcp-checklist-v1'));
          if (stored && stored.state && stored.state.isDarkMode) {
            document.documentElement.classList.add('dark');
          } else if (!stored && matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
